name: E2E (Playwright)

# Runs the browser-driven end-to-end suite (accessibility + the cash-session
# money-path flow) against a real, freshly-built stack: Postgres + backend +
# frontend, all spun up inside the CI runner.
#
# This is heavier/slower than the unit CI (ci.yml), so it runs on PRs to the
# protected branches and on manual dispatch — not on every push.
#
# NOTE: visual.spec.ts is intentionally NOT run here. Its baseline screenshots
# are OS-specific (committed ones are *-win32, generated on Windows) and would
# not match this Linux runner. To enable it, commit Linux baselines first — see
# the "Visual regression" note at the bottom of this file.

on:
  pull_request:
    branches: [ "main", "development" ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch of pos-backend / pos-frontend to test"
        default: "development"

jobs:
  e2e:
    name: End-to-end (a11y + cash-session)
    runs-on: ubuntu-latest

    # Postgres the backend connects to. Credentials match docker-compose.yml.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lumora_pos
          POSTGRES_USER: lumora_user
          POSTGRES_PASSWORD: SecretPassword123!
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lumora_user -d lumora_pos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # backend/ and frontend/ are SEPARATE repos (not real submodules of this
      # one — .gitmodules exists but no gitlinks are committed), so check them
      # out explicitly into ./backend and ./frontend.
      #
      # CI_PAT must be a repository secret: a token with read access to both
      # pos-backend and pos-frontend. The default GITHUB_TOKEN only reaches this
      # repo. If those repos are public, you can delete the two `token:` lines.
      - name: Check out backend
        uses: actions/checkout@v4
        with:
          repository: LumoraTechSolution/pos-backend
          ref: ${{ github.event.inputs.ref || 'development' }}
          token: ${{ secrets.CI_PAT }}
          path: backend

      - name: Check out frontend
        uses: actions/checkout@v4
        with:
          repository: LumoraTechSolution/pos-frontend
          ref: ${{ github.event.inputs.ref || 'development' }}
          token: ${{ secrets.CI_PAT }}
          path: frontend

      # ── Backend: build the jar, then run it ──────────────────────────────
      # On boot, Flyway applies V1..V42 — which seeds the demo tenant, the admin
      # (admin@demo.lumora.com / admin123) and the cashier (V42), so the e2e
      # logins work against a clean database.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package

      - name: Start backend
        working-directory: ./backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/lumora_pos
          DB_USERNAME: lumora_user
          DB_PASSWORD: SecretPassword123!
          JWT_SECRET: CiSecretKeyMustBeAtLeast32CharactersLong!!
          APP_SECURITY_COOKIE_SECURE: "false"
          SPRING_PROFILES_ACTIVE: prod
          # Don't throttle the suite — it logs in many times. (Prod default is 10/15min.)
          RATE_LIMIT_LOGIN_CAPACITY: "100000"
        run: |
          nohup java -jar target/*.jar > backend.log 2>&1 &
          echo "Waiting for backend health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/actuator/health > /dev/null; then
              echo "Backend is up."; exit 0
            fi
            sleep 3
          done
          echo "::error::Backend failed to start"; tail -n 100 backend.log; exit 1

      # ── Frontend: build + serve the production bundle ────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start frontend
        working-directory: ./frontend
        run: |
          nohup npm start > frontend.log 2>&1 &
          echo "Waiting for frontend..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000/login > /dev/null; then
              echo "Frontend is up."; exit 0
            fi
            sleep 3
          done
          echo "::error::Frontend failed to start"; tail -n 100 frontend.log; exit 1

      # ── Seed one in-stock product ────────────────────────────────────────
      # Migrations seed users but no products. cash-session.spec rings up the
      # first product on the terminal grid, so give it something to sell.
      - name: Seed a product
        run: |
          TENANT=$(curl -s "http://localhost:8081/api/v1/public/tenants/resolve?domain=DEMO" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['tenantId'])")
          TOKEN=$(curl -s -X POST http://localhost:8081/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"admin@demo.lumora.com\",\"password\":\"admin123\",\"tenantId\":\"$TENANT\"}" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['accessToken'])")
          curl -sf -X POST http://localhost:8081/api/v1/products \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"name":"E2E Test Widget","basePrice":50.00,"stockQuantity":100,"lowStockThreshold":5}' \
            -o /dev/null -w "seed product HTTP %{http_code}\n"

      # ── Playwright ───────────────────────────────────────────────────────
      - name: Install Playwright browser
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e (a11y + cash-session)
        working-directory: ./frontend
        run: npx playwright test a11y.spec.ts cash-session.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./frontend/playwright-report
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Visual regression (visual.spec.ts) — how to enable later:
#   1. Generate Linux baselines that match this runner (do it once, locally):
#        docker run --rm -v "$PWD":/work -w /work/frontend \
#          mcr.microsoft.com/playwright:v1.49.1-jammy \
#          npx playwright test visual.spec.ts --update-snapshots
#      (Match the image tag to the @playwright/test version in frontend/package.json.)
#   2. Commit the new e2e/visual.spec.ts-snapshots/*-linux.png files.
#   3. Add `visual.spec.ts` to the "Run e2e" step above.
# Without Linux baselines, visual.spec fails on CI due to font-rendering diffs.
