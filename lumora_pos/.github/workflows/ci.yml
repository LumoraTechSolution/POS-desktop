name: CI Pipeline

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Ensure wrapper is executable
      run: chmod +x mvnw
    - name: Check for duplicate Flyway migration versions
      run: |
        versions=$(ls src/main/resources/db/migration/V*.sql 2>/dev/null \
          | sed 's|.*/V\([0-9]*\)__.*|\1|' | sort -n)
        duplicates=$(echo "$versions" | uniq -d)
        if [ -n "$duplicates" ]; then
          echo "ERROR: Duplicate Flyway migration version(s) found: $duplicates"
          exit 1
        fi
        echo "OK: No duplicate Flyway migration versions."
    - name: Build and Test
      run: ./mvnw clean verify

  frontend-test:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npm run typecheck
    - name: Lint
      run: npm run lint
    - name: Unit tests
      run: npm test
    - name: Build
      run: npm run build
