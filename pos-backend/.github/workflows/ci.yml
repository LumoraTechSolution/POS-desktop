name: CI

# Per-repo CI for the backend. Runs the same gates the team relies on locally:
# a Flyway duplicate-version guard, then the full build + test suite (H2).
on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ensure wrapper is executable
        run: chmod +x mvnw

      - name: Check for duplicate Flyway migration versions
        run: |
          versions=$(ls src/main/resources/db/migration/V*.sql 2>/dev/null \
            | sed 's|.*/V\([0-9]*\)__.*|\1|' | sort -n)
          duplicates=$(echo "$versions" | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "ERROR: Duplicate Flyway migration version(s) found: $duplicates"
            exit 1
          fi
          echo "OK: No duplicate Flyway migration versions."

      - name: Build and test
        run: ./mvnw -B clean verify
