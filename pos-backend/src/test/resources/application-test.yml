spring:
  datasource:
    url: jdbc:h2:mem:lumora_pos_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: false

  # Disable security auto-config for pure unit tests
  security:
    enabled: false

# JWT config for test — must match app.jwt.* prefix used by JwtProperties
app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci1sdW1vcmEtcG9zLXRlc3RpbmctcHVycG9zZXMtb25seQ==
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

logging:
  level:
    com.lumora.pos: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
